<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="al1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="al2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="al3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="al4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="al5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <marker id="ala" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker>
    <filter id="als"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="780" height="520" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">Agent Loop -- Two Approaches</text>

  <!-- LEFT: Batched Sync -->
  <text x="195" y="55" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Approach A: Batched Sync</text>
  <text x="195" y="72" text-anchor="middle" fill="#94a3b8" font-size="10">One request per beacon</text>

  <!-- Register -->
  <rect x="85" y="85" width="220" height="36" rx="8" fill="url(#al1)" filter="url(#als)"/>
  <text x="195" y="100" text-anchor="middle" fill="white" font-size="11" font-weight="600">1. POST /register</text>
  <text x="195" y="114" text-anchor="middle" fill="#c7d2fe" font-size="9">Get agent_id + token</text>
  <line x1="195" y1="121" x2="195" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#ala)"/>

  <!-- Loop box -->
  <rect x="50" y="140" width="290" height="340" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="55" y="133" width="48" height="16" rx="4" fill="#1e293b"/>
  <text x="79" y="145" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">LOOP</text>

  <!-- Execute locally -->
  <rect x="85" y="155" width="220" height="36" rx="8" fill="url(#al3)" filter="url(#als)"/>
  <text x="195" y="170" text-anchor="middle" fill="white" font-size="11" font-weight="600">2. Execute tasks locally</text>
  <text x="195" y="184" text-anchor="middle" fill="#a7f3d0" font-size="9">Run commands, capture screenshots, etc.</text>
  <line x1="195" y1="191" x2="195" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#ala)"/>

  <!-- Single sync -->
  <rect x="70" y="210" width="250" height="80" rx="8" fill="url(#al4)" filter="url(#als)"/>
  <text x="195" y="228" text-anchor="middle" fill="white" font-size="12" font-weight="700">3. POST /agent/sync</text>
  <text x="195" y="245" text-anchor="middle" fill="#fef3c7" font-size="9">Send: commands, downloads, screenshots,</text>
  <text x="195" y="258" text-anchor="middle" fill="#fef3c7" font-size="9">keylogs, socks, portfwd -- all at once</text>
  <text x="195" y="275" text-anchor="middle" fill="#fef3c7" font-size="9">Receive: new commands, file data, proxy data</text>
  <line x1="195" y1="290" x2="195" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#ala)"/>

  <!-- Process response -->
  <rect x="85" y="310" width="220" height="36" rx="8" fill="url(#al2)" filter="url(#als)"/>
  <text x="195" y="325" text-anchor="middle" fill="white" font-size="11" font-weight="600">4. Process response</text>
  <text x="195" y="339" text-anchor="middle" fill="#bae6fd" font-size="9">Queue new commands, handle files</text>
  <line x1="195" y1="346" x2="195" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#ala)"/>

  <!-- Sleep -->
  <rect x="85" y="365" width="220" height="36" rx="8" fill="url(#al5)" filter="url(#als)"/>
  <text x="195" y="380" text-anchor="middle" fill="white" font-size="11" font-weight="600">5. Sleep(interval)</text>
  <text x="195" y="394" text-anchor="middle" fill="#fecaca" font-size="9">Jitter optional</text>

  <!-- Loop arrow -->
  <path d="M 305 385 Q 350 385 350 165 Q 350 155 305 155" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ala)"/>

  <!-- DIVIDER -->
  <line x1="390" y1="55" x2="390" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- RIGHT: Individual Endpoints -->
  <text x="585" y="55" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">Approach B: Individual Endpoints</text>
  <text x="585" y="72" text-anchor="middle" fill="#94a3b8" font-size="10">Separate call per operation</text>

  <!-- Register -->
  <rect x="475" y="85" width="220" height="36" rx="8" fill="url(#al1)" filter="url(#als)"/>
  <text x="585" y="100" text-anchor="middle" fill="white" font-size="11" font-weight="600">1. POST /register</text>
  <text x="585" y="114" text-anchor="middle" fill="#c7d2fe" font-size="9">Get agent_id + token</text>
  <line x1="585" y1="121" x2="585" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#ala)"/>

  <!-- Loop box -->
  <rect x="440" y="140" width="290" height="340" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="445" y="133" width="48" height="16" rx="4" fill="#1e293b"/>
  <text x="469" y="145" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">LOOP</text>

  <rect x="475" y="155" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="175" text-anchor="middle" fill="#e2e8f0" font-size="10">GET /agent/checkin</text>

  <rect x="475" y="195" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="215" text-anchor="middle" fill="#e2e8f0" font-size="10">POST /agent/command/response</text>

  <rect x="475" y="235" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="255" text-anchor="middle" fill="#e2e8f0" font-size="10">POST /agent/download/chunk</text>

  <rect x="475" y="275" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="295" text-anchor="middle" fill="#e2e8f0" font-size="10">POST /agent/screenshot</text>

  <rect x="475" y="315" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="335" text-anchor="middle" fill="#e2e8f0" font-size="10">POST /agent/socks/sync</text>

  <rect x="475" y="355" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="585" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">... other endpoints as needed</text>

  <!-- Sleep -->
  <rect x="475" y="400" width="220" height="32" rx="6" fill="url(#al5)" filter="url(#als)"/>
  <text x="585" y="420" text-anchor="middle" fill="white" font-size="11" font-weight="600">Sleep(interval)</text>

  <!-- Loop arrow -->
  <path d="M 695 415 Q 740 415 740 165 Q 740 155 695 155" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ala)"/>

  <!-- Footer -->
  <text x="390" y="505" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Both approaches are fully supported and can be mixed.</text>
</svg>
