<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="af1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="af2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="ahg" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="780" height="420" rx="12" fill="#0f172a"/>
  <text x="390" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Authentication Flow</text>

  <!-- Agent column -->
  <rect x="60" y="55" width="130" height="35" rx="8" fill="url(#af1)" filter="url(#sh)"/>
  <text x="125" y="78" text-anchor="middle" fill="white" font-size="13" font-weight="600">Agent / SDK</text>
  <line x1="125" y1="90" x2="125" y2="400" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Listener column -->
  <rect x="360" y="55" width="130" height="35" rx="8" fill="url(#af2)" filter="url(#sh)"/>
  <text x="425" y="78" text-anchor="middle" fill="white" font-size="13" font-weight="600">Listener</text>
  <line x1="425" y1="90" x2="425" y2="400" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Step 1: Register -->
  <rect x="55" y="115" width="140" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="134" text-anchor="middle" fill="#e2e8f0" font-size="11">POST /register</text>
  <line x1="195" y1="129" x2="355" y2="129" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="275" y="122" text-anchor="middle" fill="#64748b" font-size="9">HexioExternalAgentAuth: passphrase</text>

  <!-- Step 1 label -->
  <rect x="20" y="118" width="22" height="22" rx="11" fill="#6366f1"/>
  <text x="31" y="134" text-anchor="middle" fill="white" font-size="11" font-weight="700">1</text>

  <!-- Verify passphrase -->
  <rect x="360" y="145" width="130" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="425" y="162" text-anchor="middle" fill="#fbbf24" font-size="10">Verify passphrase</text>

  <!-- Step 2: Return token -->
  <rect x="355" y="185" width="140" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="425" y="204" text-anchor="middle" fill="#e2e8f0" font-size="11">{agent_id, token}</text>
  <line x1="355" y1="199" x2="195" y2="199" stroke="#34d399" stroke-width="1.5" marker-end="url(#ahg)"/>

  <!-- Step 2 label -->
  <rect x="20" y="188" width="22" height="22" rx="11" fill="#10b981"/>
  <text x="31" y="204" text-anchor="middle" fill="white" font-size="11" font-weight="700">2</text>

  <!-- Store token -->
  <rect x="55" y="225" width="140" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="242" text-anchor="middle" fill="#a78bfa" font-size="10">Store token locally</text>

  <!-- Divider -->
  <line x1="40" y1="268" x2="740" y2="268" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="390" y="285" text-anchor="middle" fill="#64748b" font-size="10">All subsequent requests</text>

  <!-- Step 3: Authenticated request -->
  <rect x="55" y="300" width="140" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="319" text-anchor="middle" fill="#e2e8f0" font-size="11">GET /agent/checkin</text>
  <line x1="195" y1="314" x2="355" y2="314" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Step 3 label -->
  <rect x="20" y="303" width="22" height="22" rx="11" fill="#6366f1"/>
  <text x="31" y="319" text-anchor="middle" fill="white" font-size="11" font-weight="700">3</text>

  <!-- Both headers shown -->
  <rect x="530" y="295" width="230" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="645" y="313" text-anchor="middle" fill="#94a3b8" font-size="9">HexioExternalAgentAuth: passphrase</text>
  <text x="645" y="330" text-anchor="middle" fill="#94a3b8" font-size="9">HexioAgentToken: eyJhbGci...</text>
  <line x1="530" y1="314" x2="495" y2="314" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Verify both -->
  <rect x="360" y="350" width="130" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="425" y="367" text-anchor="middle" fill="#fbbf24" font-size="10">Verify both headers</text>

  <!-- Step 4: Response -->
  <rect x="355" y="385" width="140" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="425" y="404" text-anchor="middle" fill="#e2e8f0" font-size="11">{commands: [...]}</text>
  <line x1="355" y1="399" x2="195" y2="399" stroke="#34d399" stroke-width="1.5" marker-end="url(#ahg)"/>

  <!-- Step 4 label -->
  <rect x="20" y="388" width="22" height="22" rx="11" fill="#10b981"/>
  <text x="31" y="404" text-anchor="middle" fill="white" font-size="11" font-weight="700">4</text>
</svg>
